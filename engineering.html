        <dt><kbd>q</kbd></dt><dd>Toggle quiz mode</dd>
        <dt><kbd>p</kbd></dt><dd>Print current section</dd>
        <dt><kbd>?</kbd></dt><dd>This help</dd>
        <dt><kbd>Esc</kbd></dt><dd>Close panels</dd>
      </dl>
      <button class="btn modal-close" type="button">Close</button>
